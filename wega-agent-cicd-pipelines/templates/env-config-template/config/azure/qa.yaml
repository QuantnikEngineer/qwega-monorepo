# config/azure/qa.yaml
# Azure Container Apps - QA

env:
  ENVIRONMENT: qa
  LOG_LEVEL: INFO
  FEATURE_DEBUG_MODE: "false"
  FEATURE_VERBOSE_ERRORS: "true"
  
  API_BASE_URL: https://qa-api.wega.azurecontainer.io
  
  DB_HOST: qa-wega-db.postgres.database.azure.com
  DB_PORT: "5432"
  DB_NAME: wega_qa
  
  MAX_WORKERS: "4"
