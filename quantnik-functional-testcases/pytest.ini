[pytest]
markers =
    smoke: Quick smoke tests for basic functionality
    regression: Full regression test suite
    brd: BRD Generator related tests
    userstory: User Story related tests
    testcase: Test Case generation tests
    testscript: Test Script generation tests
    testdata: Test Data generation tests
    codeassistant: Code Assistant tests
    usermanual: User Manual tests

testpaths = tests
python_files = *.py
python_functions = test_*
addopts = -v --tb=short
