# WEGA Anomaly Agent - Kubernetes Deployment
# Customer configures via environment variables

apiVersion: apps/v1
kind: Deployment
metadata:
  name: wega-anomaly-agent
  namespace: wega-system
  labels:
    app: wega-anomaly-agent
    component: ai-engine
spec:
  replicas: 2
  selector:
    matchLabels:
      app: wega-anomaly-agent
  template:
    metadata:
      labels:
        app: wega-anomaly-agent
    spec:
      serviceAccountName: wega-anomaly-agent
      containers:
      - name: anomaly-agent
        image: wipro/wega-anomaly-agent:latest
        ports:
        - containerPort: 8080
          name: http
        
        # ============ CUSTOMER CONFIGURABLE ENV VARS ============
        env:
        # Adapter Selection
        - name: MONITORING_ADAPTER
          valueFrom:
            configMapKeyRef:
              name: wega-anomaly-config
              key: monitoring_adapter
        - name: AI_PROVIDER
          valueFrom:
            configMapKeyRef:
              name: wega-anomaly-config
              key: ai_provider
        
        # Thresholds
        - name: CONFIDENCE_AUTO_THRESHOLD
          valueFrom:
            configMapKeyRef:
              name: wega-anomaly-config
              key: confidence_auto_threshold
        - name: CONFIDENCE_REVIEW_THRESHOLD
          valueFrom:
            configMapKeyRef:
              name: wega-anomaly-config
              key: confidence_review_threshold
        - name: TRANSIENT_CPU_THRESHOLD
          valueFrom:
            configMapKeyRef:
              name: wega-anomaly-config
              key: transient_cpu_threshold
        - name: CONFIRMATION_WAIT_SECONDS
          valueFrom:
            configMapKeyRef:
              name: wega-anomaly-config
              key: confirmation_wait_seconds
        
        # Scaling Limits
        - name: SCALING_MIN_REPLICAS
          valueFrom:
            configMapKeyRef:
              name: wega-anomaly-config
              key: scaling_min_replicas
        - name: SCALING_MAX_REPLICAS
          valueFrom:
            configMapKeyRef:
              name: wega-anomaly-config
              key: scaling_max_replicas
        
        # Behavior
        - name: AUTO_REMEDIATE_ENABLED
          valueFrom:
            configMapKeyRef:
              name: wega-anomaly-config
              key: auto_remediate_enabled
        - name: REQUIRE_HUMAN_APPROVAL
          valueFrom:
            configMapKeyRef:
              name: wega-anomaly-config
              key: require_human_approval
        
        # AI Settings
        - name: AI_MODEL
          valueFrom:
            configMapKeyRef:
              name: wega-anomaly-config
              key: ai_model
        
        # Client Info
        - name: CLIENT_NAME
          valueFrom:
            configMapKeyRef:
              name: wega-anomaly-config
              key: client_name
        - name: ENVIRONMENT
          valueFrom:
            configMapKeyRef:
              name: wega-anomaly-config
              key: environment
        - name: DEBUG
          valueFrom:
            configMapKeyRef:
              name: wega-anomaly-config
              key: debug
              optional: true
        
        # Kubernetes
        - name: K8S_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: K8S_IN_CLUSTER
          value: "true"
        
        # Secrets
        - name: AI_API_KEY
          valueFrom:
            secretKeyRef:
              name: wega-anomaly-secrets
              key: ai_api_key
        - name: MONITORING_API_KEY
          valueFrom:
            secretKeyRef:
              name: wega-anomaly-secrets
              key: monitoring_api_key
        - name: MONITORING_APP_KEY
          valueFrom:
            secretKeyRef:
              name: wega-anomaly-secrets
              key: monitoring_app_key
              optional: true
        
        # Health Probes
        livenessProbe:
          httpGet:
            path: /live
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        
        # Resources
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        
        # Security
        securityContext:
          runAsNonRoot: true
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL

---
apiVersion: v1
kind: Service
metadata:
  name: wega-anomaly-agent
  namespace: wega-system
spec:
  selector:
    app: wega-anomaly-agent
  ports:
  - port: 80
    targetPort: 8080
    name: http
  type: ClusterIP

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: wega-anomaly-agent
  namespace: wega-system

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: wega-anomaly-agent
rules:
- apiGroups: ["apps"]
  resources: ["deployments", "deployments/scale"]
  verbs: ["get", "list", "watch", "patch", "update"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: wega-anomaly-agent
subjects:
- kind: ServiceAccount
  name: wega-anomaly-agent
  namespace: wega-system
roleRef:
  kind: ClusterRole
  name: wega-anomaly-agent
  apiGroup: rbac.authorization.k8s.io
