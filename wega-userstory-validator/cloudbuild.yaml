# Cloud Build configuration for Wega Userstory Validator
# This file automates building and deploying to Cloud Run

# Substitution variables (can be overridden at build time)
substitutions:
  _SERVICE_NAME: Wega-userstory-validator
  _REGION: us-central1
  _REPOSITORY: Wega-userstory-validator-repo
  _IMAGE_NAME: wega-validator
  _CONFLUENCE_EMAIL: ''
  _CONFLUENCE_API_TOKEN: ''
  _GOOGLE_CLOUD_API_KEY: ''

# Build steps
steps:
  # Step 1: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:$COMMIT_SHA'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:latest'
      - '.'

  # Step 2: Push the image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push'
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}'

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:$COMMIT_SHA'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '1Gi'
      - '--cpu'
      - '1'
      - '--timeout'
      - '300'
      - '--concurrency'
      - '80'
      - '--set-env-vars'
      - 'CONFLUENCE_EMAIL=${_CONFLUENCE_EMAIL},CONFLUENCE_API_TOKEN=${_CONFLUENCE_API_TOKEN},GOOGLE_CLOUD_API_KEY=${_GOOGLE_CLOUD_API_KEY}'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '10'

# Store images in Artifact Registry
images:
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:$COMMIT_SHA'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:latest'

# Build options
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

# Build timeout (15 minutes)
timeout: '900s'
