# QUANTNIK Anomaly Agent - ConfigMap
# Customer configures these values for their environment

apiVersion: v1
kind: ConfigMap
metadata:
  name: quantnik-anomaly-config
  namespace: quantnik-system
data:
  # ============ ADAPTER SELECTION ============
  # Options: datadog, prometheus, cloudwatch, splunk, dynatrace
  monitoring_adapter: "datadog"
  
  # Options: gemini, bedrock, vertex, openai, azure_openai
  ai_provider: "gemini"
  
  # Options: harness, jenkins, argocd, gitlab_ci, tekton, none
  orchestrator_adapter: "harness"
  
  # ============ THRESHOLDS ============
  # Auto-remediate if confidence >= this value (0-100)
  confidence_auto_threshold: "80"
  
  # Human review if confidence between review and auto (0-100)
  confidence_review_threshold: "60"
  
  # CPU below this % is considered transient spike
  transient_cpu_threshold: "50"
  
  # Seconds to wait before confirming sustained issue
  confirmation_wait_seconds: "300"
  
  # ============ SCALING LIMITS ============
  scaling_min_replicas: "1"
  scaling_max_replicas: "10"
  scaling_cooldown_seconds: "300"
  
  # ============ BEHAVIOR ============
  # Enable automatic remediation
  auto_remediate_enabled: "true"
  
  # Always require human approval (overrides auto)
  require_human_approval: "false"
  
  # ============ AI SETTINGS ============
  # Model name (varies by provider)
  # gemini: gemini-2.5-flash, gemini-1.5-pro
  # bedrock: anthropic.claude-3-sonnet, amazon.titan-text-express
  # vertex: gemini-1.5-pro
  # openai: gpt-4-turbo, gpt-4o
  # azure_openai: <deployment-name>
  ai_model: "gemini-2.5-flash"
  
  ai_timeout_seconds: "30"
  ai_max_tokens: "8192"
  
  # ============ CLIENT INFO ============
  client_name: "default"
  environment: "demo"
