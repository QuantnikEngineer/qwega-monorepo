openapi: 3.1.0
info:
  title: QUANTNIK Code Review Agent API
  description: |
    Stateless FastAPI backend for automated AI code review. CARA supports
    two review modes:

    - **Pull request review** — triggered via the `pull_request` GitHub
      webhook or via a natural-language `/prompt` that references a PR.
    - **Repository scan** — triggered via a natural-language `/prompt` that
      references only a repository (and, optionally, a branch/tag/commit
      reference and a folder filter).

    Versioned review reports are persisted and retrievable per mode:
    `/reports/{owner}/{repo}/pulls/{pr_number}` for PR reviews and
    `/reports/{owner}/{repo}/scans/{ref}` (with `?folder=` and `?version=`)
    for repository scans.
  version: 0.2.0
servers:
  - url: http://localhost:8001
    description: Local development server

tags:
  - name: Webhooks
    description: GitHub webhook receivers.
  - name: Prompt
    description: Manual natural-language review triggers (PR review and repository scan).
  - name: Reports
    description: Retrieve versioned review reports (per pull request or per repository scan).

paths:
  /webhook:
    post:
      tags: [Webhooks]
      summary: GitHub pull_request webhook receiver
      operationId: handleGithubPullRequestWebhook
      description: |
        Receives GitHub `pull_request` webhook events. Verifies the
        `X-Hub-Signature-256` signature when `GITHUB_WEBHOOK_SECRET` is
        configured. Queues a background review for supported actions
        (`opened`, `synchronize`). Returns `202 Accepted` immediately.
      parameters:
        - in: header
          name: X-GitHub-Event
          required: true
          schema:
            type: string
            enum: [pull_request]
        - in: header
          name: X-Hub-Signature-256
          required: false
          description: HMAC SHA-256 signature of the payload using the shared webhook secret.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GitHubPullRequestWebhookPayload'
      responses:
        '202':
          description: Webhook accepted (review queued or action ignored).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcceptedReviewResponse'
        '400':
          description: Invalid or unsupported payload / event.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid or missing webhook signature.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation error on payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Service misconfiguration (e.g. missing credentials).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /prompt:
    post:
      tags: [Prompt]
      summary: Trigger a review or repository scan from a natural-language command
      operationId: triggerReviewFromPrompt
      description: |
        Accepts a natural-language command. Uses Gemini to extract the
        target `owner`, `repo`, and (optionally) `pr_number`, `ref`
        (branch / tag / commit), and `folder` filter. Behaviour:

        - If `pr_number > 0` is detected, CARA verifies the pull request
          exists and queues a **pull request review**. The response sets
          `mode = "pull_request"`.
        - Otherwise CARA verifies the repository exists and queues a
          **repository scan**. The response sets `mode = "repository"`,
          and returns the inferred `ref` (defaulting to the repo's default
          branch) and any `folder` filter.

        In both cases the call returns `202 Accepted` immediately and the
        actual review runs as a background task. The persisted report can
        later be fetched from `/reports/{owner}/{repo}/pulls/{pr_number}`
        (PR mode) or `/reports/{owner}/{repo}/scans/{ref}` (scan mode).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PromptReviewRequest'
            examples:
              pullRequest:
                summary: Pull request review
                value:
                  command: "Scan PR-11 of acme/rocket repository."
              repositoryScan:
                summary: Whole-repository scan
                value:
                  command: "Scan the main branch of acme/rocket repository."
              repositoryFolderScan:
                summary: Folder-restricted scan
                value:
                  command: "Scan only the src/api folder of acme/rocket repository."
      responses:
        '202':
          description: Prompt understood, review or scan queued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcceptedReviewResponse'
              examples:
                acceptedPr:
                  summary: PR review queued
                  value:
                    status: accepted
                    message: Pull request review queued from natural language prompt.
                    owner: acme
                    repo: rocket
                    pr_number: 11
                    source: prompt
                    mode: pull_request
                acceptedScan:
                  summary: Repository scan queued
                  value:
                    status: accepted
                    message: Repository scan queued from natural language prompt.
                    owner: acme
                    repo: rocket
                    pr_number: 0
                    source: prompt
                    mode: repository
                    ref: main
                    folder: src/api
        '400':
          description: Unable to parse the target pull request or repository from the prompt.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation error on request body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Service misconfiguration (e.g. missing credentials).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /reports/{owner}/{repo}/pulls/{pr_number}:
    get:
      tags: [Reports]
      summary: Fetch a pull request review report
      operationId: getReport
      description: |
        Returns the latest persisted review report for the given pull request.
        Pass `?version=<n>` to retrieve a specific historical version.
      parameters:
        - in: path
          name: owner
          required: true
          schema:
            type: string
          example: acme
        - in: path
          name: repo
          required: true
          schema:
            type: string
          example: rocket
        - in: path
          name: pr_number
          required: true
          schema:
            type: integer
            minimum: 1
          example: 11
        - in: query
          name: version
          required: false
          description: Optional version number. If omitted, returns the latest.
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Persisted review report.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PersistedReviewReport'
        '404':
          description: No report found for this pull request or version.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /reports/{owner}/{repo}/scans/{ref}:
    get:
      tags: [Reports]
      summary: Fetch a repository scan report
      operationId: getScanReport
      description: |
        Returns the latest persisted **repository scan** report for the given
        `owner/repo` at the given `ref` (branch, tag, or commit SHA).

        - `ref` is a path parameter declared as `{ref:path}`, so multi-segment
          refs are supported (e.g. `feature/foo`, `release/2026.04`). When
          calling this endpoint from a browser, encode each segment but keep
          the `/` separators.
        - Pass `?folder=` to scope the report to a specific subdirectory of
          the repository (must match the folder used when the scan was
          queued).
        - Pass `?version=<n>` to retrieve a specific historical version;
          omit it to retrieve the latest persisted version.
      parameters:
        - in: path
          name: owner
          required: true
          schema:
            type: string
          example: acme
        - in: path
          name: repo
          required: true
          schema:
            type: string
          example: rocket
        - in: path
          name: ref
          required: true
          description: Branch, tag, or commit reference. Multi-segment refs are supported.
          schema:
            type: string
            minLength: 1
          examples:
            mainBranch:
              value: main
            featureBranch:
              value: feature/awesome-thing
            commitSha:
              value: 9fceb02
        - in: query
          name: folder
          required: false
          description: Optional subdirectory the scan was scoped to (POSIX-style relative path).
          schema:
            type: string
          example: src/api
        - in: query
          name: version
          required: false
          description: Optional version number. If omitted, returns the latest.
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Persisted repository scan report.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PersistedReviewReport'
        '404':
          description: No scan report found for this repository / ref / folder / version.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    GitHubSignature:
      type: apiKey
      in: header
      name: X-Hub-Signature-256

  schemas:

    # ---------- Enums ----------
    ReviewSource:
      type: string
      enum: [webhook, prompt]

    ReviewMode:
      type: string
      description: |
        Indicates whether a review/report targets a single pull request
        (`pull_request`) or an entire repository at a given ref
        (`repository`).
      enum: [pull_request, repository]

    ReviewOverallStatus:
      type: string
      enum: [pass, needs_attention, failed]

    ReviewSeverity:
      type: string
      enum: [critical, high, medium, low, info]

    ReviewIssueType:
      type: string
      enum: [Security_Vulnerability, Bug, Missing_Best_Practice]

    ReviewFindingCategory:
      type: string
      enum: [security, quality, best_practice, jira_alignment, operational]

    JiraValidationStatus:
      type: string
      enum: [aligned, partially_aligned, not_aligned, not_evaluated]

    # ---------- Requests ----------
    PromptReviewRequest:
      type: object
      required: [command]
      properties:
        command:
          type: string
          minLength: 5
          description: |
            Natural-language command describing what to review.

            - For a pull request: include the PR number and the
              `owner/repo` slug, e.g. `"Scan PR-11 of acme/rocket"`.
            - For a repository scan: omit the PR number and (optionally)
              specify a branch / tag / commit and a folder, e.g.
              `"Scan only the src/api folder of acme/rocket repository."`
          examples:
            - "Scan PR-11 of acme/rocket repository."
            - "Scan the main branch of acme/rocket repository."
            - "Scan only the src folder of acme/rocket repository."

    GitHubRepositoryOwnerPayload:
      type: object
      required: [login]
      properties:
        login:
          type: string

    GitHubRepositoryPayload:
      type: object
      required: [name, owner]
      properties:
        name:
          type: string
        owner:
          $ref: '#/components/schemas/GitHubRepositoryOwnerPayload'

    GitHubPullRequestRefPayload:
      type: object
      required: [ref, sha]
      properties:
        ref:
          type: string
        sha:
          type: string

    GitHubPullRequestPayload:
      type: object
      required: [number, title, html_url, head, base]
      properties:
        number:
          type: integer
          minimum: 1
        title:
          type: string
        body:
          type: string
          nullable: true
        html_url:
          type: string
          format: uri
        head:
          $ref: '#/components/schemas/GitHubPullRequestRefPayload'
        base:
          $ref: '#/components/schemas/GitHubPullRequestRefPayload'

    GitHubPullRequestWebhookPayload:
      type: object
      required: [action, repository, pull_request]
      properties:
        action:
          type: string
          example: opened
        repository:
          $ref: '#/components/schemas/GitHubRepositoryPayload'
        pull_request:
          $ref: '#/components/schemas/GitHubPullRequestPayload'

    # ---------- Responses ----------
    AcceptedReviewResponse:
      type: object
      required: [status, message, owner, repo, pr_number, source]
      properties:
        status:
          type: string
          enum: [accepted, ignored]
        message:
          type: string
        owner:
          type: string
        repo:
          type: string
        pr_number:
          type: integer
          minimum: 0
          description: |
            Zero-based PR number. `0` indicates that no pull request was
            referenced and CARA queued a **repository scan** instead. For
            pull request reviews this value is always ≥ 1.
        source:
          $ref: '#/components/schemas/ReviewSource'
        mode:
          allOf:
            - $ref: '#/components/schemas/ReviewMode'
          description: |
            Whether the queued job targets a pull request or an entire
            repository. Defaults to `pull_request` when the field is
            absent (back-compat with older clients).
          default: pull_request
        ref:
          type: string
          nullable: true
          description: |
            For `mode = repository`, the branch/tag/commit reference the
            scan was queued against. CARA fills this with the repository's
            default branch when the user did not specify one. `null` for
            pull request reviews.
        folder:
          type: string
          nullable: true
          description: |
            For `mode = repository`, the optional subdirectory the scan
            was scoped to (POSIX-style relative path, no leading slash).
            `null` for whole-repo scans and pull request reviews.

    ErrorResponse:
      type: object
      required: [code, detail]
      properties:
        code:
          type: string
          example: bad_request
        detail:
          type: string
        errors:
          type: array
          nullable: true
          items:
            type: object
            additionalProperties: true

    # ---------- Domain models ----------
    ReviewFinding:
      type: object
      required: [title, severity, category, description, recommendation]
      properties:
        title:
          type: string
        severity:
          $ref: '#/components/schemas/ReviewSeverity'
        category:
          $ref: '#/components/schemas/ReviewFindingCategory'
        description:
          type: string
        recommendation:
          type: string
        file_path:
          type: string
          nullable: true
        line_number:
          type: integer
          minimum: 1
          nullable: true
        issue_type:
          allOf:
            - $ref: '#/components/schemas/ReviewIssueType'
          nullable: true
        severity_score:
          type: integer
          minimum: 1
          maximum: 10
          nullable: true
        comment:
          type: string
          nullable: true
        cwe_identifier:
          type: string
          nullable: true
        suggested_remediation_code:
          type: string
          nullable: true

    JiraValidationResult:
      type: object
      required: [issue_key, status, summary]
      properties:
        issue_key:
          type: string
        status:
          $ref: '#/components/schemas/JiraValidationStatus'
        summary:
          type: string
        uncovered_requirements:
          type: array
          items:
            type: string
          default: []

    ReviewAssessment:
      type: object
      required: [overall_status, summary]
      properties:
        overall_status:
          $ref: '#/components/schemas/ReviewOverallStatus'
        summary:
          type: string
        strengths:
          type: array
          items:
            type: string
          default: []
        findings:
          type: array
          items:
            $ref: '#/components/schemas/ReviewFinding'
          default: []
        jira_validation:
          allOf:
            - $ref: '#/components/schemas/JiraValidationResult'
          nullable: true

    ReviewReport:
      allOf:
        - $ref: '#/components/schemas/ReviewAssessment'
        - type: object
          required: [owner, repo, pr_number, source]
          properties:
            owner:
              type: string
            repo:
              type: string
            pr_number:
              type: integer
              minimum: 0
              description: |
                Zero when `mode = repository`; ≥ 1 when `mode = pull_request`.
            source:
              $ref: '#/components/schemas/ReviewSource'
            trigger_event:
              type: string
              nullable: true
            pull_request_url:
              type: string
              format: uri
              nullable: true
              description: PR HTML URL — populated only for pull request reports.
            reviewed_commit_sha:
              type: string
              nullable: true
            jira_issue_key:
              type: string
              nullable: true
            context_files:
              type: array
              items:
                type: string
              default: []
            mode:
              allOf:
                - $ref: '#/components/schemas/ReviewMode'
              default: pull_request
              description: Review mode this report was produced for.
            scanned_ref:
              type: string
              nullable: true
              description: |
                Branch / tag / commit SHA the repository scan ran against.
                Populated only when `mode = repository`.
            scanned_folder:
              type: string
              nullable: true
              description: |
                Optional subdirectory the repository scan was scoped to.
                Populated only when `mode = repository` and the user
                requested a folder filter.
            repository_url:
              type: string
              format: uri
              nullable: true
              description: |
                Repository HTML URL — populated for repository scan reports
                (`mode = repository`). For pull request reports, prefer
                `pull_request_url`.

    PersistedReviewReport:
      allOf:
        - $ref: '#/components/schemas/ReviewReport'
        - type: object
          required: [version, created_at]
          properties:
            version:
              type: integer
              minimum: 1
            created_at:
              type: string
              format: date-time
