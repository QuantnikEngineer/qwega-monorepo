# =============================================================================
# K8s Secrets for code-assist deployment
# =============================================================================
# IMPORTANT: This is an EXAMPLE file. Do NOT commit real secrets to git!
#
# To create the secret, run:
#   kubectl create secret generic code-assist-secrets \
#     --from-literal=factory-api-key='your-factory-api-key' \
#     --from-literal=harness-pat='your-harness-pat-token'
#
# Or apply this file after replacing placeholders:
#   kubectl apply -f secrets.yaml
# =============================================================================

apiVersion: v1
kind: Secret
metadata:
  name: code-assist-secrets
  labels:
    app: code-assist
type: Opaque
stringData:
  # Factory API Key - Generate from: https://app.factory.ai/settings/api-keys
  factory-api-key: "<YOUR_FACTORY_API_KEY>"
  
  # Harness PAT Token - Generate from Harness Account Settings > API Keys
  harness-pat: "<YOUR_HARNESS_PAT_TOKEN>"
