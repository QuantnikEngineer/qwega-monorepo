apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: code-assist
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
    - host: code-assist.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: code-assist
                port:
                  number: 80
