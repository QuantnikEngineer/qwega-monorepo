# =============================================================================
# Cloud Build Configuration for Wega Common Integration Service
# =============================================================================
# Usage:
#   # Deploy without profile
#   gcloud builds submit --config cloudbuild.yaml
#
#   # Deploy with profile
#   gcloud builds submit --config cloudbuild.yaml --substitutions=_PROFILE=dev
#   gcloud builds submit --config cloudbuild.yaml --substitutions=_PROFILE=qa
#   gcloud builds submit --config cloudbuild.yaml --substitutions=_PROFILE=stage
#   gcloud builds submit --config cloudbuild.yaml --substitutions=_PROFILE=prod
#
#   # Deploy with custom region
#   gcloud builds submit --config cloudbuild.yaml --substitutions=_PROFILE=dev,_REGION=us-east1
# =============================================================================

substitutions:
  _PROFILE: ''
  _REGION: 'us-central1'
  _SERVICE_BASE_NAME: 'wega-common-integration-service'
  _MEMORY: '2Gi'
  _CPU: '2'
  _TIMEOUT: '600'
  _MIN_INSTANCES: '0'
  _MAX_INSTANCES: '10'

steps:
  # Step 1: Determine service name based on profile
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'set-service-name'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        if [ -n "${_PROFILE}" ]; then
          echo "${_PROFILE}-${_SERVICE_BASE_NAME}" > /workspace/service_name.txt
        else
          echo "${_SERVICE_BASE_NAME}" > /workspace/service_name.txt
        fi
        echo "Service name: $(cat /workspace/service_name.txt)"

  # Step 2: Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-image'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/${_PROFILE:+${_PROFILE}-}${_SERVICE_BASE_NAME}:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/${_PROFILE:+${_PROFILE}-}${_SERVICE_BASE_NAME}:latest'
      - '.'

  # Step 3: Push the container image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-image'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/${_PROFILE:+${_PROFILE}-}${_SERVICE_BASE_NAME}:$COMMIT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-image-latest'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/${_PROFILE:+${_PROFILE}-}${_SERVICE_BASE_NAME}:latest'

  # Step 4: Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'deploy'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        SERVICE_NAME=$(cat /workspace/service_name.txt)
        
        # Determine APP_ENV based on profile
        APP_ENV="${_PROFILE:-development}"
        
        # Determine DEBUG based on profile
        if [ "${_PROFILE}" = "dev" ]; then
          DEBUG="true"
          LOG_LEVEL="DEBUG"
          SSL_VERIFY="false"
        else
          DEBUG="false"
          LOG_LEVEL="INFO"
          SSL_VERIFY="true"
        fi
        
        # Construct RAG agent URL based on profile
        if [ -n "${_PROFILE}" ] && [ "${_PROFILE}" != "prod" ]; then
          RAG_AGENT_URL="https://${_PROFILE}-wega-rag-$PROJECT_NUMBER.${_REGION}.run.app"
          PLANNING_ORCH_URL="https://${_PROFILE}-wega-planning-orchestrator-$PROJECT_NUMBER.${_REGION}.run.app"
        else
          RAG_AGENT_URL="https://wega-rag-$PROJECT_NUMBER.${_REGION}.run.app"
          PLANNING_ORCH_URL="https://wega-planning-orchestrator-$PROJECT_NUMBER.${_REGION}.run.app"
        fi
        
        echo "Deploying $${SERVICE_NAME} to Cloud Run..."
        echo "  APP_ENV: $${APP_ENV}"
        echo "  RAG_AGENT_URL: $${RAG_AGENT_URL}"
        
        gcloud run deploy $${SERVICE_NAME} \
          --image gcr.io/$PROJECT_ID/$${SERVICE_NAME}:$COMMIT_SHA \
          --platform managed \
          --region ${_REGION} \
          --allow-unauthenticated \
          --memory ${_MEMORY} \
          --cpu ${_CPU} \
          --timeout ${_TIMEOUT} \
          --concurrency 80 \
          --min-instances ${_MIN_INSTANCES} \
          --max-instances ${_MAX_INSTANCES} \
          --set-env-vars "APP_ENV=$${APP_ENV}" \
          --set-env-vars "DEBUG=$${DEBUG}" \
          --set-env-vars "LOG_LEVEL=$${LOG_LEVEL}" \
          --set-env-vars "SSL_VERIFY=$${SSL_VERIFY}" \
          --set-env-vars "RAG_AGENT_URL=$${RAG_AGENT_URL}" \
          --set-env-vars "PLANNING_ORCHESTRATOR_URL=$${PLANNING_ORCH_URL}" \
          --set-env-vars "PORT=8002" \
          --set-env-vars "HOST=0.0.0.0"

  # Step 5: Print deployment info
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'print-info'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        SERVICE_NAME=$(cat /workspace/service_name.txt)
        SERVICE_URL=$(gcloud run services describe $${SERVICE_NAME} --region ${_REGION} --format 'value(status.url)')
        echo "=========================================="
        echo "  Deployment Complete!"
        echo "=========================================="
        echo "  Service: $${SERVICE_NAME}"
        echo "  Profile: ${_PROFILE:-'(none)'}"
        echo "  Region: ${_REGION}"
        echo "  URL: $${SERVICE_URL}"
        echo "  Health: $${SERVICE_URL}/health"
        echo "  Docs: $${SERVICE_URL}/docs"
        echo "=========================================="

images:
  - 'gcr.io/$PROJECT_ID/${_PROFILE:+${_PROFILE}-}${_SERVICE_BASE_NAME}:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/${_PROFILE:+${_PROFILE}-}${_SERVICE_BASE_NAME}:latest'

options:
  logging: CLOUD_LOGGING_ONLY
