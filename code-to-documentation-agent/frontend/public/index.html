<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/AILogo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#6366f1" />
    
    <!-- Enhanced SEO Meta Tags -->
    <meta
      name="description"
      content="AI-Powered Code To Documentation Agent - Transform your codebase into comprehensive documentation instantly. Chat with repositories, generate docs, and visualize architecture with GPT-4."
    />
    <meta name="keywords" content="AI documentation, automated documentation, code documentation, repository analysis, GPT-4, documentation generator, enterprise documentation, code to docs, AI assistant" />
    <meta name="author" content="Code To Documentation Agent" />
    <meta name="robots" content="index, follow" />
    
    <!-- Open Graph Meta Tags -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Code To Documentation Agent - AI Documentation Automation" />
    <meta property="og:description" content="Transform your codebase into comprehensive documentation with AI. Enterprise-ready documentation automation powered by GPT-4." />
    <meta property="og:image" content="%PUBLIC_URL%/AILogo.png" />
    
    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Code To Documentation Agent" />
    <meta name="twitter:description" content="AI-powered documentation automation for enterprise codebases" />
    
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/AILogo.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    
    <!-- Runtime environment variables -->
    <script src="%PUBLIC_URL%/env-config.js"></script>
    
    <!-- Claude AI-inspired Modern Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Söhne:wght@400;500;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    
    <title>Code To Documentation Agent | AI-Powered Documentation</title>
    
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', 'Roboto', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background: linear-gradient(135deg, #f5f7fa 0%, #e9ecef 100%);
        color: #1f2937;
      }
      
      code, pre {
        font-family: 'Fira Code', 'Courier New', monospace;
      }
      
      #root {
        min-height: 100vh;
      }
      
      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 10px;
        height: 10px;
      }
      
      ::-webkit-scrollbar-track {
        background: #f1f5f9;
        border-radius: 10px;
      }
      
      ::-webkit-scrollbar-thumb {
        background: linear-gradient(180deg, #6366f1 0%, #8b5cf6 100%);
        border-radius: 10px;
      }
      
      ::-webkit-scrollbar-thumb:hover {
        background: linear-gradient(180deg, #4f46e5 0%, #7c3aed 100%);
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
