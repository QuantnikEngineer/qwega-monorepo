# config/secrets.yaml
# Secret references (names only - values in cloud secret managers)
#
# To add a new secret:
# 1. Request DevOps to create in cloud secret managers
# 2. Add reference here
# 3. Access in code: os.getenv('SECRET_NAME')

secrets:
  - envVar: DB_PASSWORD
    description: "Database password"
    required: true

  - envVar: OPENAI_API_KEY
    description: "OpenAI API key"
    required: true

  - envVar: JWT_SECRET
    description: "JWT signing secret"
    required: true
