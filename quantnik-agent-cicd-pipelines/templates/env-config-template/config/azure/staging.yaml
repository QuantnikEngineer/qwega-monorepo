# config/azure/staging.yaml
# Azure Container Apps - Staging

env:
  ENVIRONMENT: staging
  LOG_LEVEL: INFO
  FEATURE_DEBUG_MODE: "false"
  FEATURE_VERBOSE_ERRORS: "false"
  
  API_BASE_URL: https://staging-api.quantnik.azurecontainer.io
  
  DB_HOST: staging-quantnik-db.postgres.database.azure.com
  DB_PORT: "5432"
  DB_NAME: quantnik_staging
  
  MAX_WORKERS: "4"
